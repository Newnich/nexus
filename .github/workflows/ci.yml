name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Fast feedback: lint, typecheck, unit tests (~2 min) ──
  quick-checks:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      REDIS_HOST: localhost
      REDIS_PORT: "6379"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npx prettier --check "**/*.{ts,tsx,js,jsx,json,css,md}"

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint

      - name: Create env file
        run: |
          cat > .env.local << 'EOF'
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EOF

      - name: Seed test data
        run: npx tsx scripts/seed.ts

      - name: Run unit tests
        run: npm test

      - name: Test coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-upload
          fail_ci_if_error: false

      - uses: actions/upload-artifact@v7
        if: ${{ always() }}
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── E2E tests against production build (runs after quick-checks) ──
  e2e:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    needs: quick-checks

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      REDIS_HOST: localhost
      REDIS_PORT: "6379"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Create env file
        run: |
          cat > .env.local << 'EOF'
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EOF

      - name: Seed Redis defaults
        run: |
          node -e "
            (async () => {
              const Redis = require('ioredis');
              const redis = new Redis({ host: 'localhost', port: 6379 });
              await redis.set('nexus:alert:thresholds', JSON.stringify({
                consecutiveFailuresThreshold: 3,
                workerInactivityHours: 2,
                backlogThreshold: 1000
              }));
              await redis.set('nexus:notification:cooldowns', JSON.stringify({
                slack: 30,
                discord: 30,
                email: 30
              }));
              await redis.quit();
              console.log('Redis defaults seeded successfully');
            })().catch(e => { console.error('Redis seeding failed:', e); process.exit(1); });
          "

      - name: Build production app
        run: npm run build

      - name: Run E2E tests against production build
        run: |
          npx next start -p 3000 &
          for i in $(seq 1 10); do
            curl -s -o /dev/null http://localhost:3000 && break
            sleep 2
          done
          npx playwright test

      - uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  # ── Docker build check (runs in parallel with e2e) ──
  docker:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (app)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: nexus-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Docker image (worker)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker
          push: false
          load: true
          tags: nexus-worker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify images exist
        run: |
          docker images nexus-app:ci
          docker images nexus-worker:ci
          echo "✅ Both Docker images built successfully"
