# ═══════════════════════════════════════════════════════════════════════════════
# NEXUS — Dependabot Auto-Merge
# ═══════════════════════════════════════════════════════════════════════════════
# Automatically approves and merges Dependabot PRs for non-major dependency
# updates after CI passes.
#
# Security: uses pull_request_target (safe because Dependabot is a trusted
# actor) and only operates on PRs authored by Dependabot.
# ═══════════════════════════════════════════════════════════════════════════════

name: Auto-merge Dependabot PRs

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Fetch Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Log update type
        run: |
          echo "Dependency: ${{ steps.dependabot-metadata.outputs.dependency-names }}"
          echo "Update type: ${{ steps.dependabot-metadata.outputs.update-type }}"

      - name: Approve PR (patch/minor only)
        if: |
          steps.dependabot-metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.dependabot-metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (patch/minor only)
        if: |
          steps.dependabot-metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.dependabot-metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
