# ═══════════════════════════════════════════════════════════════════════════════
# NEXUS — Dependabot Alert Summary
# ═══════════════════════════════════════════════════════════════════════════════
# Runs weekly to create an issue summarizing all open Dependabot alerts.
# This keeps security vulnerabilities visible and helps prioritize fixes.
#
# The "dependencies" label is created by Dependabot. The "security" label
# is created by this workflow if it doesn't already exist.
# ═══════════════════════════════════════════════════════════════════════════════

name: Dependabot Alert Summary

on:
  schedule:
    # Every Monday at 12:00 UTC (8:00 AM ET / 7:00 AM EDT)
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  contents: read
  security-events: read

jobs:
  alert-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Ensure required labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          for label in "dependencies" "security"; do
            gh label create "$label" --repo "$REPO" 2>/dev/null \
              && echo "Created label: $label" \
              || echo "Label already exists: $label"
          done

      - name: Fetch Dependabot alerts
        id: alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          response=$(gh api \
            --header "Accept: application/vnd.github+json" \
            "/repos/${REPO}/dependabot/alerts?state=open&per_page=100" 2>&1) || true

          count=$(echo "$response" | jq 'if type == "array" then length else 0 end')
          echo "open_count=$count" >> "$GITHUB_OUTPUT"
          echo "Found $count open Dependabot alerts"

          # Store for next step
          echo "$response" > /tmp/alerts.json

      - name: Create summary issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          count=${{ steps.alerts.outputs.open_count }}
          date_label=$(date -u '+%Y-%m-%d')
          title="📊 Weekly Dependabot Alert Summary — ${date_label}"

          # Close previous summary issue if one exists
          previous=$(gh issue list \
            --repo "$REPO" \
            --label "dependencies,security" \
            --state open \
            --json number,title \
            --jq '.[] | select(.title | startswith("📊 Weekly Dependabot Alert Summary")) | .number' \
            | head -1)

          if [ -n "$previous" ]; then
            gh issue close "$previous" \
              --repo "$REPO" \
              --comment "Superseded by [new summary](${GITHUB_SERVER_URL}/${REPO}/issues/new?title=${title})."
          fi

          # Build issue body
          if [ "$count" -eq "0" ]; then
            body="## ✅ No Open Dependabot Alerts

          Great news — there are currently **zero** open Dependabot alerts for this repository.

          ---

          _Generated by the Dependabot Alert Summary workflow on ${date_label}._"
          else
            alerts_table=$(cat /tmp/alerts.json | jq -r '
              if type == "array" then
                ["| CVE / GHSA | Severity | Package | Summary | Link |",
                 "|---|---|---|---|---|"] +
                (.[] | [
                  .security_advisory.cve_id // "GHSA-\(.security_advisory.ghsa_id)",
                  .security_advisory.severity,
                  .dependency.package.name,
                  (.security_advisory.summary[:80]),
                  "[view](\(.html_url))"
                ] | "| \(.[0]) | \(.[1]) | \(.[2]) | \(.[3])... | \(.[4]) |")
              else
                empty
              end
            ')

            body="## ⚠️ Open Dependabot Alerts

          There are **${count}** open Dependabot alerts that need attention.

          ${alerts_table}

          ---

          _Generated by the Dependabot Alert Summary workflow on ${date_label}._"
          fi

          # Create the issue
          gh issue create \
            --repo "$REPO" \
            --title "$title" \
            --body "$body" \
            --label "dependencies,security"

          echo "✅ Created summary issue: $title"
