# ═══════════════════════════════════════════════════════════════════════════════
# NEXUS — Dependabot Alert Summary
# ═══════════════════════════════════════════════════════════════════════════════
# Runs weekly to create an issue summarizing all open Dependabot alerts.
# This keeps security vulnerabilities visible and helps prioritize fixes.
#
# Requires: GH token with read access to Dependabot alerts
# (GITHUB_TOKEN has this by default for public repos).
# ═══════════════════════════════════════════════════════════════════════════════

name: Dependabot Alert Summary

on:
  schedule:
    # Every Monday at 8:00 AM ET (adjust timezone as needed)
    - cron: "0 12 * * 1"
  workflow_dispatch: # Allow manual trigger

permissions:
  issues: write
  contents: read
  security-events: read

jobs:
  alert-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Dependabot alerts
        id: alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # Fetch all open Dependabot alerts via GitHub API
          # Note: Dependabot Alerts API is in preview
          response=$(gh api "/repos/${REPO}/dependabot/alerts?state=open&per_page=100" 2>&1) || true
          
          # Save to file for processing
          echo "$response" > alerts.json
          
          # Count alerts
          count=$(echo "$response" | jq 'if type == "array" then length else 0 end')
          echo "open_count=$count" >> $GITHUB_OUTPUT
          
          echo "Found $count open Dependabot alerts"

      - name: Generate summary issue
        id: summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          count=${{ steps.alerts.outputs.open_count }}
          
          if [ "$count" -eq "0" ]; then
            BODY=$(cat << 'EOF'
          ## ✅ No Open Dependabot Alerts
          
          Great news — there are currently **zero** open Dependabot alerts for this repository.
          
          _Generated by the Dependabot Alert Summary workflow._
          EOF
          )
          elif [ "$count" -gt "0" ]; then
            # Build a formatted list of alerts
            ALERTS_LIST=$(echo "$(cat alerts.json)" | jq -r '
              if type == "array" then
                .[] | [
                  .security_advisory.cve_id // "GHSA-\(.security_advisory.ghsa_id)",
                  .security_advisory.severity,
                  .dependency.package.name,
                  .security_advisory.summary,
                  (.security_vulnerability.vulnerable_version_range // "unknown"),
                  .html_url
                ] | "| \(.[0]) | \(.[1]) | \(.[2]) | \(.[3][:80])... | [View](\(.[5])) |"
              else
                empty
              end
            ')
          
            BODY=$(cat << 'EOF'
          ## ⚠️ Open Dependabot Alerts
          
          | CVE / GHSA | Severity | Package | Summary | Link |
          |------------|----------|---------|---------|------|
          EOF
          )
          BODY="$BODY"$'\n'"$ALERTS_LIST"
          BODY="$BODY"$'\n\n'
          BODY="$BODY"_Generated on $(date -u '+%Y-%m-%d %H:%M UTC') by the Dependabot Alert Summary workflow._
          fi
          
          # Write body to a file for later steps
          echo "$BODY" > issue_body.md
          
          # Check if an alert summary issue already exists
          EXISTING=$(gh issue list \
            --repo "$REPO" \
            --label "dependencies" \
            --label "security" \
            --state open \
            --json number,title \
            --jq '.[] | select(.title | startswith("📊 Weekly Dependabot Alert Summary")) | .number' \
            | head -1)
          
          echo "existing_issue=$EXISTING" >> $GITHUB_OUTPUT

      - name: Create or update summary issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          EXISTING="${{ steps.summary.outputs.existing_issue }}"
          BODY=$(cat issue_body.md)
          TITLE="📊 Weekly Dependabot Alert Summary — $(date -u '+%Y-%m-%d')"
          
          if [ -n "$EXISTING" ]; then
            # Close the old issue
            gh issue close "$EXISTING" --repo "$REPO" --comment "Superseded by new summary."
          fi
          
          # Create new issue
          gh issue create \
            --repo "$REPO" \
            --title "$TITLE" \
            --body "$BODY" \
            --label "dependencies,security"
          
          echo "✅ Created issue: $TITLE"
